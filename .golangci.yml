version: 2

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - exhaustive
    - gocritic
    - gosec
    - noctx
  settings:
    exhaustive:
      default-signifies-exhaustive: true

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kvitrvn/go-ygg

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
