services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${GO_YGG_SERVER_PORT:-8080}:${GO_YGG_SERVER_PORT:-8080}"
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
    environment:
      GO_YGG_SERVER_HOST: ${GO_YGG_SERVER_HOST:-0.0.0.0}
      GO_YGG_SERVER_PORT: ${GO_YGG_SERVER_PORT:-8080}
      GO_YGG_DATABASE_DSN: ${GO_YGG_DATABASE_DSN:-postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-app}?sslmode=disable}
      GO_YGG_LOG_LEVEL: ${GO_YGG_LOG_LEVEL:-info}
      GO_YGG_LOG_FORMAT: ${GO_YGG_LOG_FORMAT:-json}

  # ── Uncomment and adapt the DB service for your driver ────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  go-cache:
  go-build-cache:
