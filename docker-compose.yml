services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - ./migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_DATABASE_DSN=${DATABASE_DSN}

  # ── Uncomment and adapt the DB service for your driver ────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
