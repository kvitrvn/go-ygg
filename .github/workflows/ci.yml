name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: templ generate ./...

      - name: Install Tailwind CSS
        env:
          TAILWIND_VERSION: v4.1.3
        run: |
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64" \
            -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss

      - name: Build CSS
        run: tailwindcss -i assets/css/input.css -o assets/css/output.css --minify

      - uses: actions/upload-artifact@v4
        with:
          name: generated
          path: |
            internal/**/*_templ.go
            assets/css/output.css

  lint:
    needs: codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run ./...

  test:
    needs: codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - name: Test
        run: go test ./... -race -count=1

  build:
    needs: codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - name: Build
        run: go build -ldflags="-s -w" ./cmd/main.go
